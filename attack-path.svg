<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="1281" viewBox="0 0 1160 1281" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,6 L0,12 z" fill="#5b6470"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1320"/><stop offset="1" stop-color="#161b2b"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1160" height="1281" fill="url(#bg)"/>
  <text x="580" y="50" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">The ClickFix + EtherHiding Attack Path</text>
  <text x="580" y="80" text-anchor="middle" fill="#9aa4b2" font-size="16">A fake "I'm not a robot" check that tricks the victim into running the malware themselves</text>
  <g font-size="13" fill="#c7ced8">
    <rect x="120" y="100" width="14" height="14" rx="3" fill="#e08a3c"/><text x="140" y="112">Human / social engineering</text>
    <rect x="330" y="100" width="14" height="14" rx="3" fill="#3d7fd1"/><text x="350" y="112">Website &amp; browser</text>
    <rect x="500" y="100" width="14" height="14" rx="3" fill="#8a63d2"/><text x="520" y="112">Blockchain hosting &amp; evasion</text>
    <rect x="760" y="100" width="14" height="14" rx="3" fill="#cf4f4f"/><text x="780" y="112">Malware delivery / C2</text>
  </g>
  <g filter="url(#sh)">
    <rect x="300" y="140" width="560" height="90" rx="12" fill="#2a2017" stroke="#e08a3c" stroke-width="2"/>
    <circle cx="338" cy="185" r="20" fill="#e08a3c"/><text x="338" y="192" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">1</text>
    <text x="374" y="174" fill="#fff" font-size="17" font-weight="700">📧  A trusted friend emails a link</text>
    <text x="374" y="198" fill="#cdb79f" font-size="14">The friend's website and email were compromised, so</text>
    <text x="374" y="218" fill="#cdb79f" font-size="14">the message looks completely genuine.</text>
  </g>
  <line x1="580" y1="230" x2="580" y2="260" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="260" width="560" height="90" rx="12" fill="#16243a" stroke="#3d7fd1" stroke-width="2"/>
    <circle cx="338" cy="305" r="20" fill="#3d7fd1"/><text x="338" y="312" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">2</text>
    <text x="374" y="294" fill="#fff" font-size="17" font-weight="700">🌐  Victim lands on a hacked WordPress site</text>
    <text x="374" y="318" fill="#a9c2e0" font-size="14">The real site loads normally — but one hidden line of</text>
    <text x="374" y="338" fill="#a9c2e0" font-size="14">code was injected into the page header.</text>
  </g>
  <line x1="580" y1="350" x2="580" y2="380" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="380" width="560" height="110" rx="12" fill="#1f1733" stroke="#8a63d2" stroke-width="2"/>
    <circle cx="338" cy="435" r="20" fill="#8a63d2"/><text x="338" y="442" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">3</text>
    <text x="374" y="414" fill="#fff" font-size="17" font-weight="700">⛓️  Payload is pulled from a blockchain ("EtherHiding")</text>
    <text x="374" y="438" fill="#c3b3e6" font-size="14">The next stages live inside smart contracts on Binance</text>
    <text x="374" y="458" fill="#c3b3e6" font-size="14">Smart Chain — not a normal server — so there is nothing</text>
    <text x="374" y="478" fill="#c3b3e6" font-size="14">to block or take down.</text>
  </g>
  <line x1="580" y1="490" x2="580" y2="520" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="520" width="560" height="110" rx="12" fill="#1f1733" stroke="#8a63d2" stroke-width="2"/>
    <circle cx="338" cy="575" r="20" fill="#8a63d2"/><text x="338" y="582" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">4</text>
    <text x="374" y="554" fill="#fff" font-size="17" font-weight="700">🕵️  It checks: "Am I being watched?"</text>
    <text x="374" y="578" fill="#c3b3e6" font-size="14">If it detects a security sandbox or automated analysis it</text>
    <text x="374" y="598" fill="#c3b3e6" font-size="14">quietly stops (it even logs "stop watching us :)").</text>
    <text x="374" y="618" fill="#c3b3e6" font-size="14">Then it picks a Windows or Mac payload.</text>
  </g>
  <line x1="580" y1="630" x2="580" y2="660" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="660" width="560" height="136" rx="12" fill="#16243a" stroke="#3d7fd1" stroke-width="2"/>
    <circle cx="338" cy="728" r="20" fill="#3d7fd1"/><text x="338" y="735" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">5</text>
    <text x="374" y="694" fill="#fff" font-size="17" font-weight="700">🤖  A fake "I am not a robot" box appears</text>
    <text x="374" y="718" fill="#a9c2e0" font-size="14">It looks like a normal CAPTCHA. Behind the scenes it</text>
    <text x="374" y="738" fill="#a9c2e0" font-size="14">secretly copies a malicious command to the clipboard</text>
    <text x="374" y="758" fill="#a9c2e0" font-size="14">and shows "Verification Steps":</text>
    <text x="374" y="782" fill="#ffd27a" font-size="15" font-weight="700">Press  ⊞ Win + R    →    Ctrl + V    →    Enter</text>
  </g>
  <line x1="580" y1="796" x2="580" y2="826" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="826" width="560" height="110" rx="12" fill="#2a2017" stroke="#e08a3c" stroke-width="2"/>
    <circle cx="338" cy="881" r="20" fill="#e08a3c"/><text x="338" y="888" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">6</text>
    <text x="374" y="860" fill="#fff" font-size="17" font-weight="700">⌨️  The victim runs the command themselves</text>
    <text x="374" y="884" fill="#cdb79f" font-size="14">The "steps" are really: open the Run box, paste the</text>
    <text x="374" y="904" fill="#cdb79f" font-size="14">hidden command, and press Enter — so the user is the</text>
    <text x="374" y="924" fill="#cdb79f" font-size="14">one who launches the attack.</text>
  </g>
  <line x1="580" y1="936" x2="580" y2="966" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="966" width="560" height="90" rx="12" fill="#2a1414" stroke="#cf4f4f" stroke-width="2"/>
    <circle cx="338" cy="1011" r="20" fill="#cf4f4f"/><text x="338" y="1018" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">7</text>
    <text x="374" y="1000" fill="#fff" font-size="17" font-weight="700">⬇️  A hidden PowerShell downloader runs</text>
    <text x="374" y="1024" fill="#e7b3b3" font-size="14">It fetches the next stage from a trusted public code CDN</text>
    <text x="374" y="1044" fill="#e7b3b3" font-size="14">(jsDelivr / GitHub), blending in with normal dev traffic.</text>
  </g>
  <line x1="580" y1="1056" x2="580" y2="1086" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <g filter="url(#sh)">
    <rect x="300" y="1086" width="560" height="110" rx="12" fill="#2a1414" stroke="#cf4f4f" stroke-width="2"/>
    <circle cx="338" cy="1141" r="20" fill="#cf4f4f"/><text x="338" y="1148" text-anchor="middle" font-size="20" font-weight="700" fill="#10131c">8</text>
    <text x="374" y="1120" fill="#fff" font-size="17" font-weight="700">💥  Malware executes &amp; calls home</text>
    <text x="374" y="1144" fill="#e7b3b3" font-size="14">Using built-in Windows tools (no obvious virus file), it loads</text>
    <text x="374" y="1164" fill="#e7b3b3" font-size="14">a remote DLL over an encrypted share and connects to the</text>
    <text x="374" y="1184" fill="#e7b3b3" font-size="14">attacker's command-and-control server. Machine compromised.</text>
  </g>
  <rect x="40" y="470" width="232" height="428" rx="12" fill="#10202a" stroke="#2f5d6e" stroke-width="1.5"/>
  <text x="156" y="498" text-anchor="middle" fill="#7fe3d6" font-size="15" font-weight="700">Why defenses miss it</text>
  <text x="56" y="522" fill="#bfeee6" font-size="12.5">• No malicious attachment —</text>
  <text x="56" y="540" fill="#bfeee6" font-size="12.5">  just a link from a friend.</text>
  <text x="56" y="558" fill="#bfeee6" font-size="12.5"></text>
  <text x="56" y="576" fill="#bfeee6" font-size="12.5">• The user "consents" by</text>
  <text x="56" y="594" fill="#bfeee6" font-size="12.5">  typing the command, so</text>
  <text x="56" y="612" fill="#bfeee6" font-size="12.5">  it looks user-initiated.</text>
  <text x="56" y="630" fill="#bfeee6" font-size="12.5"></text>
  <text x="56" y="648" fill="#bfeee6" font-size="12.5">• Payload lives on a</text>
  <text x="56" y="666" fill="#bfeee6" font-size="12.5">  blockchain — nothing to</text>
  <text x="56" y="684" fill="#bfeee6" font-size="12.5">  seize or block.</text>
  <text x="56" y="702" fill="#bfeee6" font-size="12.5"></text>
  <text x="56" y="720" fill="#bfeee6" font-size="12.5">• Uses trusted services</text>
  <text x="56" y="738" fill="#bfeee6" font-size="12.5">  (GitHub, a CDN, the chain)</text>
  <text x="56" y="756" fill="#bfeee6" font-size="12.5">  to hide in plain sight.</text>
  <text x="56" y="774" fill="#bfeee6" font-size="12.5"></text>
  <text x="56" y="792" fill="#bfeee6" font-size="12.5">• Hides from sandboxes</text>
  <text x="56" y="810" fill="#bfeee6" font-size="12.5">  and analysts.</text>
  <text x="56" y="828" fill="#bfeee6" font-size="12.5"></text>
  <text x="56" y="846" fill="#bfeee6" font-size="12.5">• Runs with built-in OS</text>
  <text x="56" y="864" fill="#bfeee6" font-size="12.5">  tools — no virus file</text>
  <text x="56" y="882" fill="#bfeee6" font-size="12.5">  on disk to scan.</text>
  <rect x="888" y="470" width="232" height="270" rx="12" fill="#221a2e" stroke="#5a4780" stroke-width="1.5"/>
  <text x="1004" y="498" text-anchor="middle" fill="#d7c4ff" font-size="15" font-weight="700">The one golden rule</text>
  <text x="904" y="524" fill="#efe6ff" font-size="13">No real website ever</text>
  <text x="904" y="544" fill="#efe6ff" font-size="13">asks you to press</text>
  <text x="904" y="564" fill="#efe6ff" font-size="13"></text>
  <text x="904" y="584" fill="#ffd27a" font-size="13" font-weight="700">⊞ Win + R</text>
  <text x="904" y="604" fill="#efe6ff" font-size="13"></text>
  <text x="904" y="624" fill="#efe6ff" font-size="13">or open a terminal to</text>
  <text x="904" y="644" fill="#efe6ff" font-size="13">"prove you are human."</text>
  <text x="904" y="664" fill="#efe6ff" font-size="13"></text>
  <text x="904" y="684" fill="#efe6ff" font-size="13">If a CAPTCHA tells you</text>
  <text x="904" y="704" fill="#efe6ff" font-size="13">to copy &amp; paste a</text>
  <text x="904" y="724" fill="#efe6ff" font-size="13">command — it is an attack.</text>
  <text x="580" y="1236" text-anchor="middle" fill="#5b6470" font-size="13">Technique: ClickFix social engineering + EtherHiding (payload staged in blockchain smart contracts).</text>
  <text x="580" y="1258" text-anchor="middle" fill="#5b6470" font-size="13">Final stage uses living-off-the-land tools (WMI, PowerShell, rundll32) and a WebDAV-over-HTTPS share.</text>
</svg>